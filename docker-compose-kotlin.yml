services:
  back:
    build:
      context: ./back-kotlin
      target: runtime
    image: nbulteau/mystravastats-back-kotlin:latest
    container_name: mystravastats-backend-kotlin
    environment:
      SERVER_ADDRESS: 0.0.0.0
      SERVER_PORT: 8080
      OPEN_BROWSER: "false"
      STRAVA_CACHE_PATH: /app/strava-cache
      OSM_ROUTING_BASE_URL: ${OSM_ROUTING_BASE_URL:-http://osrm:5000}
    ports:
      - "8080:8080"
      - "8090:8090"
    volumes:
      - ${STRAVA_CACHE_PATH:-./strava-cache}:/app/strava-cache
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health/details >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - front-back

  front:
    build: ./front-vue
    image: nbulteau/mystravastats-front:latest
    container_name: mystravastats-front
    environment:
      API_BACKEND_URL: http://back:8080
    ports:
      - "80:80"
    depends_on:
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    networks:
      - front-back

networks:
  front-back:
    driver: bridge
