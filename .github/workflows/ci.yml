name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  back-go:
    name: Back Go (fmt + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: current
          cache: npm
          cache-dependency-path: front-vue/package-lock.json

      - name: Build front-vue
        working-directory: front-vue
        env:
          VITE_CJS_TRACE: "false"
          NODE_OPTIONS: --no-deprecation
        run: |
          npm ci
          npm run build-only
          cp -r dist ../back-go/public

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: back-go/go.sum

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run Go tests
        run: go test ./...

  back-kotlin:
    name: Back Kotlin (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-kotlin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run Kotlin tests
        run: ./gradlew --no-daemon test

  front-vue:
    name: Front Vue (lint + type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-vue
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: current
          cache: npm
          cache-dependency-path: front-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npx eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts --fix

      - name: Run type-check
        run: npm run type-check

      - name: Build
        env:
          VITE_CJS_TRACE: "false"
          NODE_OPTIONS: --no-deprecation
        run: npm run build-only
